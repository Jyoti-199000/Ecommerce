<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ category.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f3f6;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: #fff;
            padding: 20px;
            border-radius: 6px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 6px;
            background: #fafafa;
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .price {
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            background: #2874f0;
            color: #fff;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }

        .empty {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Category: {{ category.name }}</h1>

    {% if page_obj %}
        <div class="grid">
            {% for product in page_obj %}
                <div class="card">
                    <h3>
                        <a href="{% url 'products:product_detail' product.slug %}">
                            {{ product.name }}
                        </a>
                    </h3>
                    <div class="price">₹ {{ product.price }}</div>

                    <form method="post" action="{% url 'cart:add_to_cart' product.id %}">
                        {% csrf_token %}
                        <button type="submit">Add to Cart</button>
                    </form>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty">
            No products available in this category.
        </div>
    {% endif %}
</div>

</body>
</html>
